{% extends "core/base.html" %}

{% block title %}Create Account | FreelanceHub{% endblock %}

{% block content %}
<div class="auth-container animate-fade-in">
    <div class="glass-panel auth-card">
        <h2><i class="fa-solid fa-user-plus"></i> Create Account</h2>
        <p class="auth-subtitle">Join the premium freelancer network</p>
        
        <form method="POST" action="{% url 'signup' %}">
            {% csrf_token %}
            
            <div class="form-group">
                <label for="username">Username</label>
                <div class="input-with-icon">
                    <i class="fa-solid fa-user"></i>
                    <input type="text" name="username" id="username" required placeholder="Choose a username">
                </div>
            </div>
            
            <div class="form-group">
                <label for="email">Email Address</label>
                <div class="input-with-icon">
                    <i class="fa-solid fa-envelope"></i>
                    <input type="email" name="email" id="email" required placeholder="name@example.com">
                </div>
            </div>
            
            <div class="form-group">
                <label for="role">I want to register as a:</label>
                <div class="input-with-icon">
                    <i class="fa-solid fa-briefcase"></i>
                    <select name="role" id="role" required>
                        <option value="client">Client (Hire Freelancers)</option>
                        <option value="freelancer">Freelancer (Work & Earn)</option>
                    </select>
                </div>
            </div>
            
            <div class="form-group">
                <label for="password">Password</label>
                <div class="input-with-icon">
                    <i class="fa-solid fa-key"></i>
                    <input type="password" name="password" id="password" required placeholder="Create a strong password">
                </div>
            </div>
            
            <div class="form-group">
                <label for="password_confirm">Confirm Password</label>
                <div class="input-with-icon">
                    <i class="fa-solid fa-circle-check"></i>
                    <input type="password" name="password_confirm" id="password_confirm" required placeholder="Repeat password">
                </div>
            </div>
            
            <button type="submit" class="btn-primary btn-block"><i class="fa-solid fa-user-plus"></i> Register</button>
        </form>
        
        <div class="auth-links">
            Already have an account? <a href="{% url 'login' %}">Sign in here</a>
        </div>
    </div>
</div>
{% endblock %}
