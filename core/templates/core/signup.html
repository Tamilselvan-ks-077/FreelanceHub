{% load static %}
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>FreelanceHub - Sign Up</title>
    <link rel="stylesheet" href="{% static 'core/css/style.css' %}">
    <script src="{% static 'core/js/main.js' %}" defer></script>
    <style>
        .auth-container {
            max-width: 450px;
            margin: 60px auto;
        }
        .auth-links {
            text-align: center;
            margin-top: 15px;
            font-size: 0.9rem;
            color: var(--text-muted);
        }
        .auth-links a {
            color: var(--primary);
            text-decoration: none;
            font-weight: 500;
        }
        .auth-links a:hover {
            text-decoration: underline;
        }
        select {
            width: 100%;
            padding: 12px 16px;
            background: rgba(255, 255, 255, 0.04);
            border: 1px solid var(--border-color);
            border-radius: 8px;
            color: var(--text-main);
            font-family: var(--font-inter);
            font-size: 1rem;
            appearance: none;
            -webkit-appearance: none;
        }
        select:focus {
            outline: none;
            border-color: var(--primary);
            background: rgba(255, 255, 255, 0.08);
        }
        select option {
            background-color: var(--bg-dark);
            color: var(--text-main);
        }
    </style>
</head>
<body>
    <div class="container">
        <header>
            <h1>FreelanceHub</h1>
            <p>Join the premier talent marketplace today</p>
        </header>

        <div class="auth-container glass-panel">
            <form method="POST" action="{% url 'signup' %}">
                {% csrf_token %}
                <h2>Create Account</h2>

                <!-- Notification Message Alerts -->
                {% if messages %}
                <ul class="messages">
                    {% for message in messages %}
                    <li class="alert {% if message.tags == 'success' %}alert-success{% else %}alert-danger{% endif %}">
                        <span>{{ message }}</span>
                        <button class="alert-close" type="button" aria-label="Close message">&times;</button>
                    </li>
                    {% endfor %}
                </ul>
                {% endif %}

                <div class="form-group">
                    <label for="username">Username</label>
                    <input type="text" id="username" name="username" required>
                </div>

                <div class="form-group">
                    <label for="email">Email Address</label>
                    <input type="email" id="email" name="email" required>
                </div>

                <div class="form-group">
                    <label for="role">Register As</label>
                    <select id="role" name="role" required>
                        <option value="client">Client (I want to hire freelancers)</option>
                        <option value="freelancer">Freelancer (I want to offer services)</option>
                    </select>
                </div>

                <div class="form-group">
                    <label for="password">Password</label>
                    <input type="password" id="password" name="password" required>
                </div>

                <div class="form-group">
                    <label for="password_confirm">Confirm Password</label>
                    <input type="password" id="password_confirm" name="password_confirm" required>
                </div>

                <button type="submit" class="btn-primary">Sign Up</button>
            </form>

            <div class="auth-links">
                Already have an account? <a href="{% url 'login' %}">Log In</a>
            </div>
        </div>
    </div>
</body>
</html>
