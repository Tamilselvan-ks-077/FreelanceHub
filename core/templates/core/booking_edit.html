{% extends "core/base.html" %}

{% block title %}Edit Booking Request | FreelanceHub{% endblock %}

{% block content %}
<div class="auth-container animate-fade-in">
    <div class="glass-panel auth-card">
        <h2><i class="fa-solid fa-pen-to-square text-primary"></i> Edit Booking Request</h2>
        <p class="auth-subtitle">Update booking details for Booking #{{ booking.id }}</p>
        
        <form method="POST" action="{% url 'booking_edit' booking.id %}">
            {% csrf_token %}
            
            <div class="form-group">
                <label for="start_date">Start Date</label>
                <input type="date" name="start_date" id="start_date" value="{{ booking.start_date|date:'Y-m-d' }}" required>
            </div>
            
            <div class="form-group">
                <label for="end_date">End Date</label>
                <input type="date" name="end_date" id="end_date" value="{{ booking.end_date|date:'Y-m-d' }}" required>
            </div>
            
            <div class="form-group">
                <label for="description">Task Description</label>
                <textarea name="description" id="description" rows="4" required>{{ booking.description }}</textarea>
            </div>
            
            <button type="submit" class="btn-primary btn-block"><i class="fa-solid fa-floppy-disk"></i> Update Request</button>
            <a href="{% url 'dashboard' %}" class="btn-secondary-link text-center btn-block">Back to Dashboard</a>
        </form>
    </div>
</div>
{% endblock %}
