{% extends "core/base.html" %}

{% block title %}Sign In | FreelanceHub{% endblock %}

{% block content %}
<div class="auth-container animate-fade-in">
    <div class="glass-panel auth-card">
        <h2><i class="fa-solid fa-lock"></i> Welcome Back</h2>
        <p class="auth-subtitle">Sign in to your FreelanceHub account</p>
        
        <form method="POST" action="{% url 'login' %}">
            {% csrf_token %}
            
            <div class="form-group">
                <label for="username">Username</label>
                <div class="input-with-icon">
                    <i class="fa-solid fa-user"></i>
                    <input type="text" name="username" id="username" required placeholder="Enter your username">
                </div>
            </div>
            
            <div class="form-group">
                <label for="password">Password</label>
                <div class="input-with-icon">
                    <i class="fa-solid fa-key"></i>
                    <input type="password" name="password" id="password" required placeholder="Enter your password">
                </div>
            </div>
            
            <button type="submit" class="btn-primary btn-block"><i class="fa-solid fa-arrow-right-to-bracket"></i> Sign In</button>
        </form>
        
        <div class="auth-links">
            Don't have an account? <a href="{% url 'signup' %}">Create one here</a>
        </div>
    </div>
</div>
{% endblock %}
